<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>demoStockVision - Iniciando Demo</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
            color: #f8fafc;
            font-family: Arial, sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 32px;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
        }
        .spinner {
            width: 46px;
            height: 46px;
            margin: 0 auto 18px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a { color: #38bdf8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h1 style="margin: 0 0 12px; font-size: 1.4rem;">demoStockVision</h1>
        <p style="margin: 0 0 14px; color: #cbd5e1;">Abrindo a versão demo automaticamente...</p>
        <p style="margin: 0; font-size: 0.95rem;">Se o redirecionamento não acontecer, <a href="src/frontend/index.html">clique aqui</a>.</p>
    </div>
    <script>
        setTimeout(() => {
            const target = 'src/frontend/index.html';
            window.location.replace(target);
        }, 500);
    </script>
</body>
</html>
