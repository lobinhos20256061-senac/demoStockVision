<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockVision - Acesse sua Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/modern.css">
    <link rel="shortcut icon" href="../assets/icons/icon-stockVision.png" type="image/png">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="position-absolute top-0 end-0 p-3">
          <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle" aria-label="Alternar tema">
            <i class="bi bi-moon-stars-fill"></i>
          </button>
    </div>

    <main class="w-100" style="max-width: 460px;">
        <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle p-3">
                    <img src="../assets/icons/icon-stockVision.png" alt="logo-icon-stockVision" class="img-fluid" style="width: 100px; height: 100px;">
                </div>
                <p class="text-success fw-semibold small mb-0">Veja o futuro. Controle o resultado.</p>
            </div>
            
            <div class="text-center mb-4">
                <h4 class="fw-bold">Acesse sua conta</h4>
                <p class="text-muted small mb-0">Insira seu e-mail e senha para continuar</p>
            </div>

            <form id="login-form">
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control form-control-lg" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Senha <span class="text-danger">*</span></label>
                    <input type="password" class="form-control form-control-lg" id="password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Entrar no Sistema</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted small mb-0">Não tem uma conta? <a href="register.html" class="text-decoration-none fw-bold">Cadastre-se</a></p>
            </div>
        </div>
    </main>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/theme.js"></script>

    <!-- <script src="../assets/js/authGuard.js"></script> -->
</body>
</html>
