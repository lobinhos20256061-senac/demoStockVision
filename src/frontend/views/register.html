<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockVision - Criar Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/modern.css">
    <link rel="shortcut icon" href="../assets/icons/icon-stockVision.png" type="image/png">

</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="position-absolute top-0 end-0 p-3">
          <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle" aria-label="Alternar tema">
            <i class="bi bi-moon-stars-fill"></i>
          </button>
    </div>

    <main class="w-100" style="max-width: 520px;">
        <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5">
            <div class="text-center mb-4">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle p-3">
                    <img src="../assets/icons/icon-stockVision.png" alt="logo-icon-stockVision" class="img-fluid" style="width: 100px; height: 100px;">
                </div>
                <p class="text-success fw-semibold small mb-0">Veja o futuro. Controle o resultado.</p>
            </div>
            </div>
            
            <div class="text-center mb-4">
                <h3 class="fw-bold">Criar conta</h3>
                <p class="text-muted small mb-0">Preencha os dados abaixo para começar</p>
            </div>

            <form id="register-form">
                <div class="mb-3"><label for="fullname" class="form-label fw-semibold">Nome Completo *</label><input type="text" id="fullname" class="form-control form-control-lg" placeholder="Ex: João Silva" required></div>
                <div class="mb-3"><label for="email" class="form-label fw-semibold">Email *</label><input type="email" id="email" class="form-control form-control-lg" placeholder="seu@email.com" required></div>
                <div class="mb-3"><label for="company" class="form-label fw-semibold">Nome da Empresa *</label><input type="text" id="company" class="form-control form-control-lg" placeholder="Sua Empresa Ltda" required></div>
                <div class="alert alert-primary py-2 px-3 small mb-3">Se você for o primeiro usuário desta empresa, será definido como administrador.</div>
                <div class="mb-3"><label for="password" class="form-label fw-semibold">Senha *</label><input type="password" id="password" class="form-control form-control-lg" minlength="6" required></div>
                <div class="mb-4"><label for="confirm-password" class="form-label fw-semibold">Confirmar Senha *</label><input type="password" id="confirm-password" class="form-control form-control-lg" minlength="6" required></div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Criar conta</button>
            </form>

            <p class="text-center mt-4 mb-0 text-muted small">Já tem uma conta? <a href="../index.html" class="text-decoration-none fw-bold">Voltar para a demo</a></p>
        </div>
    </main>

    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
