<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockVision Demo - Iniciando...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
            color: #f8fafc;
            font-family: Arial, sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 28px 32px;
            text-align: center;
            box-shadow: 0 20px 45px rgba(0,0,0,0.25);
            max-width: 420px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin: 0 0 8px; font-size: 1.2rem;">Versão demo do StockVision</h2>
        <p style="margin: 0 0 16px; color: #cbd5e1; line-height: 1.5;">Explore o painel com dados de exemplo por 5 minutos. Os gráficos, o estoque e as demais funcionalidades continuam disponíveis durante a sessão.</p>
        <button id="start-demo-btn" style="background:#38bdf8;color:#08111f;border:0;border-radius:999px;padding:12px 20px;font-weight:700;cursor:pointer;">Usar versão demo</button>
        <p id="demo-status" style="margin: 12px 0 0; color: #cbd5e1; font-size: 0.95rem;">Clique no botão para iniciar a demonstração.</p>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        (async () => {
            const statusEl = document.getElementById('demo-status');
            const button = document.getElementById('start-demo-btn');
            const demoManager = window.createDemoSessionManager ? window.createDemoSessionManager(localStorage) : null;
            if (demoManager && demoManager.isActive() && localStorage.getItem('sv_demo_mode') === 'true') {
                window.location.replace('views/dashboard.html');
                return;
            }

            button.addEventListener('click', async () => {
                button.disabled = true;
                button.textContent = 'Iniciando...';
                statusEl.textContent = 'Preparando a sessão demo...';
                try {
                    const result = await AuthAPI.enterDemo();
                    if (result && result.active) {
                        window.location.replace('views/dashboard.html');
                    } else {
                        statusEl.textContent = 'Não foi possível iniciar a demo. Tente novamente.';
                        button.disabled = false;
                        button.textContent = 'Usar versão demo';
                    }
                } catch (error) {
                    console.error(error);
                    statusEl.textContent = 'Não foi possível iniciar a demo. Tente novamente.';
                    button.disabled = false;
                    button.textContent = 'Usar versão demo';
                }
            });
        })();
    </script>
</body>
</html>
